<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Registro</title>

    <link
    rel="stylesheet"
    href="styles.css">

</head>

<body>

<div class="container">

    <div class="login-card">

        <h1>Registro</h1>

        <form id="registerForm">

            <div class="input-group">

                <label>Usuario</label>

                <input
                type="text"
                id="usuario"
                required>

            </div>

            <div class="input-group">

                <label>Contraseña</label>

                <input
                type="password"
                id="clave"
                required>

            </div>

            <button>

                Registrarse

            </button>

        </form>

        <div id="mensaje"></div>

        <p>

            ¿Ya tienes cuenta?

            <a href="/">

                Iniciar sesión

            </a>

        </p>

    </div>

</div>

<script src="register.js">

</script>

</body>

</html>
